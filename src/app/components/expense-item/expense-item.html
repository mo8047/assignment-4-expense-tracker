<div
  class="card mb-2"
  [class.border-danger]="isHighExpense"
  [class.border-secondary]="!isHighExpense"
>
  <div class="card-body d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-1" [style.color]="isHighExpense ? 'crimson' : 'inherit'">
        {{ expense.title }}
      </h5>
      <span [class]="badgeClass">{{ expense.category }}</span>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="fs-5 fw-bold">{{ expense.amount | currency }}</span>
      <a class="btn btn-sm btn-outline-secondary" [routerLink]="['/edit', expense.id]">Edit</a>
      <button class="btn btn-sm btn-danger" (click)="deleteExpense.emit(expense.id)">Delete</button>
    </div>
  </div>
</div>
